workflows:
  ios-release:
    name: DiabEasy iOS Release
    max_build_duration: 120
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.liviucozac.diabeasy
      vars:
        BUNDLE_ID: "com.liviucozac.diabeasy"
        XCODE_SCHEME: "diabeasy"
      xcode: latest
      node: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Expo prebuild
        script: |
          npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build iOS release
        script: |
          xcode-project build-ipa \
            --workspace "ios/diabeasy.xcworkspace" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
