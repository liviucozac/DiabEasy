workflows:
  ios-release:
    name: DiabEasy iOS Release
    max_build_duration: 120
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.liviucozac.diabeasy
      vars:
        XCODE_WORKSPACE: "ios/diabeasy.xcworkspace"
        XCODE_SCHEME: "diabeasy"
        APP_STORE_APPLE_ID: 1000000 # Replace with your App Store app Apple ID
      xcode: latest
      node: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build iOS release
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    integrations:
      app_store_connect: Codemagic
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
